name: Release Due2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. due2-v2.0.0, due2-cli-v0.6.2)'
        required: true

env:
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}

jobs:
  update-cask:
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'due2-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version
        id: version
        run: echo "version=${TAG_NAME#due2-v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: dmg
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}/due2-${{ steps.version.outputs.version }}.dmg"
          curl -fSL -o due2.dmg "$DMG_URL"
          SHA=$(shasum -a 256 due2.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.dmg.outputs.sha256 }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/due2.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/due2.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/due2.rb
          git commit -m "cask: update due2 to ${{ steps.version.outputs.version }}"
          git push

  update-winget:
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'due2-v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${TAG_NAME#due2-v}" >> "$GITHUB_OUTPUT"

      - name: Submit to winget-pkgs
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: myiam.Due2
          version: ${{ steps.version.outputs.version }}
          installers-regex: '-setup\.exe$'
          fork-user: sheldon-myiam
          token: ${{ secrets.WINGET_TOKEN }}

  update-cli-winget:
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'due2-cli-v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${TAG_NAME#due2-cli-v}" >> "$GITHUB_OUTPUT"

      - name: Submit to winget-pkgs
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: myiam.Due2.CLI
          version: ${{ steps.version.outputs.version }}
          installers-regex: '-windows-x64\.zip$'
          fork-user: sheldon-myiam
          token: ${{ secrets.WINGET_TOKEN }}

  update-cli-formula:
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'due2-cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version
        id: version
        run: echo "version=${TAG_NAME#due2-cli-v}" >> "$GITHUB_OUTPUT"

      - name: Download archives and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG_NAME }}"
          curl -fSL -o macos-arm64.tar.gz "$BASE_URL/due2-cli-${VERSION}-macos-arm64.tar.gz"
          curl -fSL -o linux-x64.tar.gz "$BASE_URL/due2-cli-${VERSION}-linux-x64.tar.gz"
          echo "macos_arm64=$(shasum -a 256 macos-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(shasum -a 256 linux-x64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FORMULA=Formula/due2-cli.rb
          MACOS_SHA="${{ steps.sha.outputs.macos_arm64 }}"
          LINUX_SHA="${{ steps.sha.outputs.linux_x64 }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "/macos-arm64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${MACOS_SHA}\"/; }" "$FORMULA"
          sed -i "/linux-x64/{ n; s/sha256 \"[^\"]*\"/sha256 \"${LINUX_SHA}\"/; }" "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/due2-cli.rb
          git diff --cached --quiet || { git commit -m "due2-cli: update to ${{ steps.version.outputs.version }}" && git push; }
